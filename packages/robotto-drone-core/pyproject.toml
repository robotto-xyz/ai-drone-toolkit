[project]
name = "robotto-drone-core"
version = "0.1.0"
description = "Shared parsers, utilities, and data models for the AI Drone Toolkit"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "pyulog>=1.2.2",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robotto_drone_core"]

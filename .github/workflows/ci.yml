name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint-free build & tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace (all packages)
        run: uv sync --all-packages

      - name: Download PX4 sample log fixture
        # Without this the ULog test suite silently skips every case.
        run: make -C packages/robotto-drone-core sample-log

      - name: Verify the sample log was fetched
        run: test -s packages/robotto-drone-core/tests/sample.ulg

      - name: Run tests
        run: uv run pytest
